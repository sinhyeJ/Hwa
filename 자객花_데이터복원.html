<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자객花 데이터 복원</title>
<style>
body { background:#080d1a; color:#f1f5f9; font-family:-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.box { background:#111827; border:1px solid #1e2d3d; border-radius:16px; padding:24px; max-width:400px; width:100%; text-align:center; }
.btn { background:#8b5cf6; border:none; border-radius:12px; padding:14px 24px; font-size:15px; font-weight:700; color:#fff; cursor:pointer; width:100%; margin-top:16px; font-family:inherit; }
.log { background:#0d1524; border-radius:10px; padding:12px; margin-top:14px; font-size:12px; text-align:left; line-height:2; max-height:300px; overflow-y:auto; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="box">
  <div style="font-size:24px;margin-bottom:8px">🌸 자객:花</div>
  <div style="font-size:16px;font-weight:700;margin-bottom:4px">데이터 복원</div>
  <div style="font-size:12px;color:#64748b;margin-bottom:16px">yon819@naver.com 계정 전용</div>
  <div id="status" style="font-size:13px;color:#94a3b8">로그인 상태 확인 중...</div>
  <button class="btn" id="save-btn" onclick="saveData()" style="display:none">📥 21일~27일 데이터 저장하기</button>
  <div class="log" id="log" style="display:none"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDjOsEU56G6brCWNa_upAJ06qEr6QE6HYQ",
  authDomain: "jagak-hwa.firebaseapp.com",
  projectId: "jagak-hwa",
  storageBucket: "jagak-hwa.firebasestorage.app",
  messagingSenderId: "968060767547",
  appId: "1:968060767547:web:ea710d7b0b289cdcc33b1e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 이미지에서 읽은 실제 데이터 (21일~27일)
const historicalEntries = [
  { date:'26/04/21', actual:70.0,  predicted:69.8, diff: 0.0,  trend:'유지', total:10, streak:1, comment:'유지 중이야. 패턴 확인해봐' },
  { date:'26/04/22', actual:69.5,  predicted:69.6, diff:-0.5,  trend:'하락', total:15, streak:2, comment:'좋아! 하락 추세 유지 중 😊' },
  { date:'26/04/23', actual:68.4,  predicted:69.2, diff:-1.1,  trend:'하락', total:12, streak:3, comment:'대박! 엄청난 하락세야 🔥' },
  { date:'26/04/24', actual:68.7,  predicted:68.2, diff: 0.3,  trend:'상승', total: 3, streak:4, comment:'조금 올랐지만 최근 평균은 안정적' },
  { date:'26/04/25', actual:68.4,  predicted:69.2, diff:-0.3,  trend:'하락', total:12, streak:5, comment:'대박! 엄청난 하락세야 🔥' },
  { date:'26/04/26', actual:68.7,  predicted:68.2, diff: 0.3,  trend:'상승', total: 3, streak:6, comment:'조금 올랐지만 최근 평균은 안정적' },
  { date:'26/04/27', actual:68.4,  predicted:68.9, diff:-0.3,  trend:'하락', total:13, streak:7, comment:'좋아! 하락 추세 유지 중 😊' },
];

function log(msg, color='#94a3b8') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div style="color:${color}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

auth.onAuthStateChanged(user => {
  const statusEl = document.getElementById('status');
  if(user && user.email === 'yon819@naver.com') {
    statusEl.innerHTML = `✅ <span style="color:#10b981">${user.email} 로그인 확인!</span>`;
    document.getElementById('save-btn').style.display = 'block';
  } else if(user) {
    statusEl.innerHTML = `❌ <span style="color:#ef4444">관리자 계정이 아니야 (${user.email})</span>`;
  } else {
    statusEl.innerHTML = `❌ <span style="color:#ef4444">로그인이 필요해. 먼저 자객花 앱에 로그인해줘.</span>`;
  }
});

async function saveData() {
  const user = auth.currentUser;
  if(!user || user.email !== 'yon819@naver.com') { alert('관리자 계정으로 로그인해줘!'); return; }
  
  document.getElementById('save-btn').disabled = true;
  document.getElementById('save-btn').textContent = '저장 중...';
  log('📂 기존 데이터 불러오는 중...');

  try {
    const doc = await db.collection('users').doc(user.uid).get();
    let existingEntries = [];
    if(doc.exists && doc.data().entries) {
      existingEntries = doc.data().entries;
      log(`기존 기록 ${existingEntries.length}개 발견`);
    }

    // 날짜 중복 제거하며 병합
    const existingDates = new Set(existingEntries.map(e => e.date));
    let added = 0;
    for(const entry of historicalEntries) {
      if(!existingDates.has(entry.date)) {
        existingEntries.push(entry);
        added++;
        log(`✅ ${entry.date} — ${entry.actual}kg (${entry.total>0?'+':''}${entry.total}점) 추가됨`, '#10b981');
      } else {
        log(`⏭️ ${entry.date} — 이미 존재해서 건너뜀`, '#64748b');
      }
    }

    // 날짜 순 정렬
    existingEntries.sort((a,b) => a.date.localeCompare(b.date));

    // Firestore 저장
    await db.collection('users').doc(user.uid).update({ entries: existingEntries });
    
    log(``, '');
    log(`🎉 완료! ${added}개 기록 저장됐어!`, '#8b5cf6');
    log(`총 기록: ${existingEntries.length}일`, '#a78bfa');
    document.getElementById('save-btn').textContent = '✅ 저장 완료!';
    document.getElementById('save-btn').style.background = '#10b981';
  } catch(e) {
    log(`❌ 오류: ${e.message}`, '#ef4444');
    document.getElementById('save-btn').disabled = false;
    document.getElementById('save-btn').textContent = '📥 다시 시도';
  }
}
</script>
</body>
</html>
