<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자객花 목표 저장</title>
<style>
body { background:#080d1a; color:#f1f5f9; font-family:-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.box { background:#111827; border:1px solid #1e2d3d; border-radius:16px; padding:24px; max-width:400px; width:100%; text-align:center; }
.btn { background:#10b981; border:none; border-radius:12px; padding:14px 24px; font-size:15px; font-weight:700; color:#fff; cursor:pointer; width:100%; margin-top:16px; font-family:inherit; }
.log { background:#0d1524; border-radius:10px; padding:12px; margin-top:14px; font-size:13px; text-align:left; line-height:2; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="box">
  <div style="font-size:24px;margin-bottom:8px">🎯 자객:花</div>
  <div style="font-size:16px;font-weight:700;margin-bottom:4px">목표 데이터 저장</div>
  <div style="font-size:12px;color:#64748b;margin-bottom:16px">yon819@naver.com 계정 전용</div>

  <div style="background:#0a1f13;border:1px solid #10b98135;border-radius:12px;padding:14px;margin-bottom:4px;text-align:left">
    <div style="font-size:11px;color:#10b981;font-weight:700;margin-bottom:8px">저장할 목표 정보</div>
    <div style="font-size:14px">🎯 목표 몸무게: <b>65.9kg</b></div>
    <div style="font-size:14px">📅 목표 날짜: <b>2026-05-10</b></div>
    <div style="font-size:14px">⚖️ 시작 몸무게: <b>70kg</b></div>
    <div style="font-size:14px">📊 그래프 기준: <b>날짜 진행도</b></div>
  </div>

  <div id="status" style="font-size:13px;color:#94a3b8;margin-top:12px">로그인 상태 확인 중...</div>
  <button class="btn" id="save-btn" onclick="saveGoal()" style="display:none">🎯 목표 저장하기</button>
  <div class="log" id="log" style="display:none"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDjOsEU56G6brCWNa_upAJ06qEr6QE6HYQ",
  authDomain: "jagak-hwa.firebaseapp.com",
  projectId: "jagak-hwa",
  storageBucket: "jagak-hwa.firebasestorage.app",
  messagingSenderId: "968060767547",
  appId: "1:968060767547:web:ea710d7b0b289cdcc33b1e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function log(msg, color='#94a3b8') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div style="color:${color}">${msg}</div>`;
}

auth.onAuthStateChanged(user => {
  const statusEl = document.getElementById('status');
  if(user && user.email === 'yon819@naver.com') {
    statusEl.innerHTML = `✅ <span style="color:#10b981">${user.email} 로그인 확인!</span>`;
    document.getElementById('save-btn').style.display = 'block';
  } else if(user) {
    statusEl.innerHTML = `❌ <span style="color:#ef4444">관리자 계정이 아니야 (${user.email})</span>`;
  } else {
    statusEl.innerHTML = `❌ <span style="color:#ef4444">자객花3.html에서 먼저 로그인해줘</span>`;
  }
});

async function saveGoal() {
  const user = auth.currentUser;
  if(!user || user.email !== 'yon819@naver.com') return;
  document.getElementById('save-btn').disabled = true;
  document.getElementById('save-btn').textContent = '저장 중...';
  try {
    await db.collection('users').doc(user.uid).update({
      goalKg: '65.9',
      goalDate: '2026-05-10',
      startKg: '70',
      goalGraphType: 'date'
    });
    log('✅ 목표 몸무게: 65.9kg 저장됨', '#10b981');
    log('✅ 목표 날짜: 2026-05-10 저장됨', '#10b981');
    log('✅ 시작 몸무게: 70kg 저장됨', '#10b981');
    log('🎉 완료! 자객花3.html 열어서 확인해봐', '#8b5cf6');
    document.getElementById('save-btn').textContent = '✅ 저장 완료!';
    document.getElementById('save-btn').style.background = '#8b5cf6';
  } catch(e) {
    log('❌ 오류: ' + e.message, '#ef4444');
    document.getElementById('save-btn').disabled = false;
    document.getElementById('save-btn').textContent = '🎯 다시 시도';
  }
}
</script>
</body>
</html>
